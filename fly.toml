# Fly.io app config. `fly launch` may rename the app; keep the URL green.
# Secrets (ANTHROPIC_API_KEY, VOYAGE_API_KEY, DATABASE_URL, ...) are set with
# `fly secrets set`, never committed.
app = "charity-planner"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    method = "get"
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  PORT = "3000"
